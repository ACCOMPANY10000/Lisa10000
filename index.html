<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Lisa10000</title>

<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: #000;
    cursor: crosshair;
  }

  canvas {
    display: block;
    background: #000;
  }

  /* PASSWORD SCREEN */

  #passwordScreen {
    position: fixed;
    inset: 0;
    z-index: 99999;

    display: flex;
    align-items: center;
    justify-content: center;

    background:
      radial-gradient(circle at center,
      rgba(20,20,20,0.88),
      rgba(0,0,0,0.96));

    backdrop-filter: blur(8px);
  }

  .password-box {
    width: 340px;
    max-width: 82vw;

    padding: 38px 30px;

    border-radius: 22px;

    background: rgba(20,20,20,0.72);

    border: 1px solid rgba(255,255,255,0.08);

    box-shadow:
      0 0 40px rgba(0,0,0,0.45),
      0 0 80px rgba(255,160,190,0.06);

    text-align: center;

    color: white;

    font-family:
      "Segoe UI",
      "Microsoft YaHei",
      sans-serif;
  }

  .password-box h1 {
    margin: 0 0 10px;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 2px;
  }

  .password-box p {
    margin-bottom: 28px;
    color: rgba(255,255,255,0.58);
    font-size: 14px;
  }

  .password-box input {
    width: 100%;
    box-sizing: border-box;

    padding: 14px 16px;

    border: none;
    outline: none;

    border-radius: 14px;

    background: rgba(255,255,255,0.08);

    color: white;

    font-size: 15px;
  }

  .password-box input::placeholder {
    color: rgba(255,255,255,0.35);
  }

  .password-box button {
    margin-top: 18px;

    width: 100%;
    padding: 13px;

    border: none;
    border-radius: 14px;

    background: rgba(255,160,190,0.16);

    color: white;

    font-size: 15px;
    font-weight: 500;

    cursor: pointer;

    transition: 0.25s;
  }

  .password-box button:hover {
    background: rgba(255,160,190,0.28);
  }

  #errorText {
    margin-top: 14px;
    min-height: 18px;

    color: #ff9db5;
    font-size: 13px;
  }
</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="passwordScreen">
  <div class="password-box">
    <h1>Lisa10000</h1>
    <p>A private corner in time.</p>

    <input
      type="password"
      id="passwordInput"
      placeholder="Enter password"
      autocomplete="off"
    />

    <button onclick="checkPassword()">Enter</button>

    <div id="errorText"></div>
  </div>
</div>

<canvas id="c"></canvas>

<script>

const PASSWORD = "20260411";

function checkPassword() {
  const value =
    document.getElementById("passwordInput").value;

  if (value === PASSWORD) {

    document.getElementById(
      "passwordScreen"
    ).style.display = "none";

    running = true;
    fullScreenBurst();

  } else {

    document.getElementById(
      "errorText"
    ).innerText = "Wrong password";
  }
}

document
  .getElementById("passwordInput")
  .addEventListener("keydown", e => {

    if (e.key === "Enter") {
      checkPassword();
    }
});

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: false });

let DPR, W, H;
let bgLoaded = false;
let bgAlpha = 0;
let running = false;
let paused = false;

let lastHeartRocket = 0;
let lastHeartDirect = 0;
let lastLoveText = 0;
let lastIdleRocket = 0;

const rockets = [];
const particles = [];
const texts = [];

const bg = new Image();
bg.src = "background.jpg";
bg.onload = () => bgLoaded = true;

const loveWords = [
  "我爱你", "I love you", "Te amo", "Te quiero", "Je t’aime", "Ich liebe dich",
  "Ti amo", "愛してる", "사랑해", "Я тебя люблю", "Eu te amo",
  "Σ’ αγαπώ", "Ik hou van jou", "Kocham cię", "Seni seviyorum",
  "أحبك", "मैं तुमसे प्यार करता हूँ", "Anh yêu em", "ฉันรักคุณ",
  "Mahal kita", "Aku cinta kamu", "Jag älskar dig", "Jeg elsker deg",
  "Rakastan sinua", "Volim te", "Szeretlek", "Te iubesc",
  "Milujem ťa", "Aš tave myliu", "Es tevi mīlu", "T’estimo",

  "I ♥ Lisa",
  "Lisa ♥ Wilhelm",
  "INTJ ❤ INFJ",
  "2026 · 5.20 快乐",
  "Happy 5.20, Lisa",
  "Te quiero, Lisa",
  "Always with Lisa",
  "Only Lisa",
  "For Lisa",
  "Wilhelm ❤ Lisa"
];

const heartColors = [
  "255,120,170",
  "255,160,190",
  "255,205,130",
  "255,235,195",
  "255,255,245"
];

const circleColors = [
  "255,215,120",
  "255,235,170",
  "255,245,210",
  "255,255,245",
  "255,185,95"
];

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 1.15);
  W = canvas.width = innerWidth * DPR;
  H = canvas.height = innerHeight * DPR;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

resize();
addEventListener("resize", resize);

document.addEventListener("visibilitychange", () => {
  paused = document.hidden;
});

function rand(a, b) {
  return Math.random() * (b - a) + a;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function drawBackground() {
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, innerWidth, innerHeight);

  if (bgLoaded && bgAlpha > 0.01) {
    const imgRatio = bg.width / bg.height;
    const screenRatio = innerWidth / innerHeight;

    let dw, dh, dx, dy;

    if (imgRatio > screenRatio) {
      dh = innerHeight;
      dw = dh * imgRatio;
      dx = (innerWidth - dw) / 2;
      dy = 0;
    } else {
      dw = innerWidth;
      dh = dw / imgRatio;
      dx = 0;
      dy = (innerHeight - dh) / 2;
    }

    ctx.globalAlpha = bgAlpha;
    ctx.drawImage(bg, dx, dy, dw, dh);

    ctx.fillStyle = "rgba(0,0,0,0.34)";
    ctx.fillRect(0, 0, innerWidth, innerHeight);

    ctx.globalAlpha = 1;
  }
}

function createLoveText(x, y) {
  texts.push({
    text: pick(loveWords),
    x,
    y,
    vy: rand(-0.32, -0.1),
    life: 105,
    max: 105,
    size: rand(22, 40),
    color: pick([
      "255,210,225",
      "255,235,190",
      "255,255,245",
      "255,170,205"
    ])
  });
}

function explodeHeart(x, y) {
  const count = 125;
  const scale = rand(0.23, 0.31);
  const color = pick(heartColors);

  for (let i = 0; i < count; i++) {
    const t = Math.PI * 2 * i / count;

    const hx = 16 * Math.pow(Math.sin(t), 3);
    const hy = -(
      13 * Math.cos(t)
      - 5 * Math.cos(2 * t)
      - 2 * Math.cos(3 * t)
      - Math.cos(4 * t)
    );

    particles.push({
      x,
      y,
      vx: hx * scale,
      vy: hy * scale,
      life: rand(42, 58),
      max: 58,
      color,
      width: rand(1.6, 2.9),
      tail: rand(3.8, 5.2),
      gravity: 0.035
    });
  }
}

function fullScreenBurst() {
  for (let i = 0; i < 26; i++) {
    setTimeout(() => {
      explodeHeart(
        rand(innerWidth * 0.12, innerWidth * 0.88),
        rand(innerHeight * 0.16, innerHeight * 0.72)
      );

      createLoveText(
        rand(innerWidth * 0.12, innerWidth * 0.88),
        rand(innerHeight * 0.16, innerHeight * 0.78)
      );
    }, i * 80);
  }
}

function drawParticle(p) {
  const a = Math.max(p.life / p.max, 0);

  ctx.strokeStyle = `rgba(${p.color},${a})`;
  ctx.lineWidth = p.width;

  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x - p.vx * p.tail, p.y - p.vy * p.tail);
  ctx.stroke();

  p.x += p.vx;
  p.y += p.vy;

  p.vx *= 0.982;
  p.vy *= 0.982;
  p.vy += p.gravity;

  p.life--;
}

function drawTexts() {
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let i = texts.length - 1; i >= 0; i--) {
    const t = texts[i];

    const a = Math.max(t.life / t.max, 0);

    ctx.font = `500 ${t.size}px "Segoe UI", "Microsoft YaHei", sans-serif`;

    ctx.fillStyle = `rgba(${t.color},${a})`;

    ctx.fillText(t.text, t.x, t.y);

    t.y += t.vy;
    t.life--;

    if (t.life <= 0) {
      texts.splice(i, 1);
    }
  }
}

function animate() {

  drawBackground();

  ctx.globalCompositeOperation = "lighter";

  for (let i = particles.length - 1; i >= 0; i--) {

    drawParticle(particles[i]);

    if (particles[i].life <= 0) {
      particles.splice(i, 1);
    }
  }

  drawTexts();

  requestAnimationFrame(animate);
}

canvas.onclick = e => {
  explodeHeart(e.clientX, e.clientY);
  createLoveText(e.clientX, e.clientY - 65);
};

animate();

</script>
</body>
</html>
